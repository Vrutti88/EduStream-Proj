{% extends "base.html" %}
{% block title %}Login — EduStream{% endblock %}
{% block body %}
<body class="bg-gradient">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:20px"><div class="mark">E</div>EduStream</div>
    <h1>Welcome back</h1>
    <p>Sign in to access your virtual classroom dashboard.</p>
    <form id="login-form">
      <div class="field"><label>Email</label><input type="email" id="email" required placeholder="student@edustream.edu"></div>
      <div class="field"><label>Password</label><input type="password" id="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn">Sign in</button>
    </form>
    <div class="auth-footer">No account? <a href="/register">Register</a> · <a href="/">Home</a></div>
    <div class="auth-footer" style="margin-top:12px;font-size:.75rem">Demo: admin@edustream.edu / Admin@123</div>
  </div>
</div>
</body>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const data = await API.request('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    API.setAuth(data.token, data.user);
    window.location.href = '/dashboard';
  } catch (err) { toast(err.message, true); }
};
if (API.user) window.location.href = '/dashboard';
</script>
{% endblock %}
