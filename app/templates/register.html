{% extends "base.html" %}
{% block title %}Register — EduStream{% endblock %}
{% block body %}
<body class="bg-gradient">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:20px"><div class="mark">E</div>EduStream</div>
    <h1>Create account</h1>
    <p>Join EduStream as a student or teacher.</p>
    <form id="register-form">
      <div class="field"><label>Full name</label><input id="name" required placeholder="Alex Johnson"></div>
      <div class="field"><label>Email</label><input type="email" id="email" required placeholder="alex@university.edu"></div>
      <div class="field"><label>Password</label><input type="password" id="password" required minlength="6" placeholder="Min 6 characters"></div>
      <div class="field"><label>Role</label>
        <select id="role"><option value="student">Student</option><option value="teacher">Teacher</option></select>
      </div>
      <button type="submit" class="btn">Create account</button>
    </form>
    <div class="auth-footer">Have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
</body>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('register-form').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const data = await API.request('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      })
    });
    API.setAuth(data.token, data.user);
    window.location.href = '/dashboard';
  } catch (err) { toast(err.message, true); }
};
</script>
{% endblock %}
