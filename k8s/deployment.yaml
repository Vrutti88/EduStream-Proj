apiVersion: apps/v1
kind: Deployment
metadata:
  name: edustream
  namespace: edustream
  labels:
    app: edustream
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "edustream"
    vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/edustream/db"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edustream
  template:
    metadata:
      labels:
        app: edustream
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: edustream
          image: vrutti88/edustream:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: edustream-config
            - secretRef:
                name: edustream-db-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
