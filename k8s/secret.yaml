# In production this Secret is populated by the Vault Agent Injector / External Secrets Operator,
# pulling values from Vault path: secret/edustream/db
# This file is a placeholder schema for local/manual use only.
apiVersion: v1
kind: Secret
metadata:
  name: edustream-db-secret
  namespace: edustream
type: Opaque
stringData:
  DB_USERNAME: "edustream_admin"
  DB_PASSWORD: "REPLACED_BY_VAULT_AGENT"
  DB_HOST: "edustream-db.xxxxxxx.ap-south-1.rds.amazonaws.com"
