<svg viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <rect width="1100" height="320" fill="#f6f3ee"/>
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2430">EduStream — CI/CD Deployment Flow</text>

  <g font-size="13" fill="#1b2430">
    <rect x="30" y="100" width="130" height="60" rx="6" fill="#ffe3d6" stroke="#1b2430" stroke-width="2"/>
    <text x="95" y="135" text-anchor="middle">Developer Push (GitHub)</text>

    <rect x="200" y="100" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="265" y="125" text-anchor="middle">Jenkins</text>
    <text x="265" y="143" text-anchor="middle" font-size="11" fill="#555">Build, Test, SAST</text>

    <rect x="370" y="100" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="435" y="125" text-anchor="middle">Docker</text>
    <text x="435" y="143" text-anchor="middle" font-size="11" fill="#555">Build + Trivy scan</text>

    <rect x="540" y="100" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="605" y="125" text-anchor="middle">Registry</text>
    <text x="605" y="143" text-anchor="middle" font-size="11" fill="#555">Docker Hub / ECR</text>

    <rect x="710" y="100" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="775" y="125" text-anchor="middle">Terraform</text>
    <text x="775" y="143" text-anchor="middle" font-size="11" fill="#555">Provision/Update AWS</text>

    <rect x="880" y="100" width="130" height="60" rx="6" fill="#ffe3d6" stroke="#1b2430" stroke-width="2"/>
    <text x="945" y="125" text-anchor="middle">Kubernetes</text>
    <text x="945" y="143" text-anchor="middle" font-size="11" fill="#555">Rolling deploy on EKS</text>

    <rect x="710" y="220" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="775" y="245" text-anchor="middle">Vault</text>
    <text x="775" y="263" text-anchor="middle" font-size="11" fill="#555">Inject secrets</text>

    <rect x="880" y="220" width="130" height="60" rx="6" fill="#fdfdfb" stroke="#1b2430" stroke-width="2"/>
    <text x="945" y="245" text-anchor="middle">Monitoring</text>
    <text x="945" y="263" text-anchor="middle" font-size="11" fill="#555">Prometheus, Grafana, ELK</text>
  </g>

  <g stroke="#1b2430" stroke-width="2" marker-end="url(#arrow2)">
    <line x1="160" y1="130" x2="200" y2="130"/>
    <line x1="330" y1="130" x2="370" y2="130"/>
    <line x1="500" y1="130" x2="540" y2="130"/>
    <line x1="670" y1="130" x2="710" y2="130"/>
    <line x1="840" y1="130" x2="880" y2="130"/>
    <line x1="775" y1="160" x2="775" y2="220"/>
    <line x1="840" y1="250" x2="880" y2="250"/>
    <line x1="945" y1="160" x2="945" y2="220"/>
  </g>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1b2430"/>
    </marker>
  </defs>
</svg>
